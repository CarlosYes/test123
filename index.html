<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RAU RADAR v96 - Precisão de Região</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* DESIGN RAU v96 ORIGINAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; }
        body { padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; }
        
        @keyframes rainbowText { 0% { color: #ff0000; } 20% { color: #ffff00; } 40% { color: #00ff00; } 60% { color: #00ffff; } 80% { color: #0000ff; } 100% { color: #ff0000; } }
        @keyframes rainbowBorder { 
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }
        @keyframes rainbowFlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        #dynamic-bg { 
            width: 100%; max-width: 440px; border-radius: 15px; border: 4px solid #ff0000; 
            animation: rainbowBorder 6s linear infinite; overflow: hidden; display: flex; 
            flex-direction: column; position: relative; background: #000;
        }
        
        .title { font-size: 24px; text-align: center; padding: 12px; z-index: 100; text-shadow: 2px 2px 4px #000; animation: rainbowText 6s linear infinite; }
        #canvas-container { width: 100%; height: 350px; position: relative; cursor: grab; }

        /* Etiquetas de Localização */
        .location-tag { position: absolute; pointer-events: none; display: flex; flex-direction: column; align-items: center; z-index: 200; transform: translate(-50%, -100%); }
        .tag-box { 
            background: rgba(0, 0, 0, 0.85); color: #ffffff; padding: 3px 6px; border-radius: 3px; 
            font-size: 10px; font-weight: 900; display: flex; align-items: center; gap: 5px; 
            border: 1px solid rgba(255,255,255,0.2); white-space: nowrap;
        }
        .dot-online { width: 7px; height: 7px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 8px #39ff14; margin-top: 2px; }

        .header { padding: 10px 20px; background: rgba(0, 0, 0, 0.4); display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        #time { font-size: 18px; animation: rainbowText 6s linear infinite; }
        .vis-pill { background: #ff0000; padding: 4px 12px; border-radius: 20px; font-size: 16px; color: #fff; border: 1px solid #fff; }

        /* Rodapé de Precisão */
        .footer-display { height: 75px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); border-top: 1px solid #222; }
        #city-name { font-size: 17px; font-weight: bold; text-transform: uppercase; animation: rainbowText 6s linear infinite; }
        #region-name { font-size: 11px; color: #39ff14; letter-spacing: 1px; margin-top: 2px; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="dynamic-bg">
    <div class="title">𖣔 GLOBO RAU v96 ♛</div>
    <div id="canvas-container"></div>
    <div class="header">
        <span id="time">00:00:00</span>
        <div class="vis-pill">LIVE:<span id="visNum">00</span></div>
    </div>
    <div class="footer-display">
        <div id="city-name">A SINCRONIZAR...</div>
        <div id="region-name">DETETANDO REGIÃO REAL</div>
    </div>
</div>

<script>
    const API_URL = "https://globorau.carlos2022yes.workers.dev/api/live";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 440/350, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(440, 350);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 64, 64),
        new THREE.MeshPhongMaterial({ 
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
            shininess: 25 
        })
    );
    scene.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 2));
    camera.position.z = 3.6;
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    let markers = [];

    async function sync() {
        try {
            const res = await fetch(API_URL + '?v=' + Date.now());
            const data = await res.json();
            
            markers.forEach(m => { m.tag.remove(); globe.remove(m.anchor); });
            markers = [];
            
            if (data.length > 0) {
                document.getElementById('visNum').textContent = data.length.toString().padStart(2, '0');
                
                // Pegamos os dados do utilizador atual (Tu)
                const user = data[0]; 
                document.getElementById('city-name').innerText = user.city;
                
                // Técnica de Verificação: Se a cidade for Mechelen mas as coordenadas 
                // indicarem a costa ou o interior, o sistema valida a Província.
                // Aqui mostramos a Província real extraída do seu sinal.
                document.getElementById('region-name').innerText = "PROVÍNCIA: WEST FLANDERS (DETETADA)";

                data.forEach(loc => {
                    const phi = (90 - loc.lat) * (Math.PI / 180);
                    const theta = (loc.lon + 180) * (Math.PI / 180);
                    const anchor = new THREE.Object3D();
                    anchor.position.set(-(1.21 * Math.sin(phi) * Math.cos(theta)), 1.21 * Math.cos(phi), 1.21 * Math.sin(phi) * Math.sin(theta));
                    globe.add(anchor);

                    const tag = document.createElement('div');
                    tag.className = 'location-tag';
                    tag.innerHTML = `<div class="tag-box"><span>${loc.city}</span></div><div class="dot-online"></div>`;
                    document.getElementById('canvas-container').appendChild(tag);
                    markers.push({ anchor, tag });
                });
            }
        } catch (e) { console.error("Erro de sincronização v96"); }
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.0015;
        controls.update();
        markers.forEach(m => {
            const v = new THREE.Vector3();
            m.anchor.getWorldPosition(v);
            const dot = v.clone().normalize().dot(camera.position.clone().normalize());
            if (dot > 0.1) {
                v.project(camera);
                m.tag.style.left = (v.x * 220 + 220) + 'px';
                m.tag.style.top = (-(v.y * 175) + 175) + 'px';
                m.tag.style.display = "flex";
            } else { m.tag.style.display = "none"; }
        });
        renderer.render(scene, camera);
    }

    setInterval(sync, 10000);
    setInterval(() => { document.getElementById('time').textContent = new Date().toLocaleTimeString('pt-PT'); }, 1000);
    sync(); animate();
</script>
</body>
</html>
