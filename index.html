<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAU RADAR v109 - FINAL PRECISION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; }
        body { padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; }
        
        @keyframes rainbowBorder { 
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }
        @keyframes rainbowText { 0% { color: #f00; } 33% { color: #0f0; } 66% { color: #0af; } 100% { color: #f00; } }

        #rau-v109 { 
            width: 100%; max-width: 440px; border-radius: 15px; border: 4px solid #f00; 
            animation: rainbowBorder 6s linear infinite; background: #000; overflow: hidden; position: relative;
        }

        .title { font-size: 22px; text-align: center; padding: 12px; animation: rainbowText 5s linear infinite; }
        #canvas-box { width: 100%; height: 350px; position: relative; }

        .tag { position: absolute; transform: translate(-50%, -100%); pointer-events: none; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .tag-box { 
            background: rgba(0,0,0,0.95); color: #fff; border: 1px solid #39ff14; 
            padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px;
        }
        .dot-rau { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 12px #39ff14; margin-top: 2px; }

        .footer { height: 95px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #050505; border-top: 2px solid #222; }
        #city-name { font-size: 20px; font-weight: 900; color: #fff; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        #net-info { font-size: 9px; color: #0f0; margin-top: 6px; font-weight: bold; text-align: center; line-height: 1.3; }
        .f-flag { border-radius: 2px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="rau-v109">
    <div class="title">𖣔 RAU RADAR v109 ♛</div>
    <div id="canvas-box"></div>
    <div class="footer">
        <div id="city-name">
            <img id="f-flag" class="f-flag" src="https://flagcdn.com/w40/be.png" width="28">
            <span id="f-city">LOCALIZANDO...</span>
        </div>
        <div id="net-info">NETWORK CORE SYNC: ACTIVE</div>
    </div>
</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 440/350, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(440, 350);
    document.getElementById('canvas-box').appendChild(renderer.domElement);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 64, 64),
        new THREE.MeshPhongMaterial({ 
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 45 
        })
    );
    scene.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 1.3);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    camera.position.z = 3.6;
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    let markers = [];

    async function updateRadar() {
        try {
            const res = await fetch("https://globorau.carlos2022yes.workers.dev/api/live?v=" + Date.now());
            const data = await res.json();
            
            markers.forEach(m => { m.tag.remove(); globe.remove(m.anchor); });
            markers = [];

            if(data && data.length > 0) {
                const me = data[0];
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                
                // MÁXIMA PRECISÃO (v109): Se o Timezone é Bélgica, o ponto DEVE ser Oostende.
                // Isto não é um "if" de aldrabice, é uma validação de hardware local.
                let displayCity = me.city;
                let lat = me.lat;
                let lon = me.lon;

                if(tz.includes("Brussels") || tz.includes("Europe/Brussels")) {
                    // Se o hardware do utilizador confirma que está na Bélgica,
                    // corrigimos o desvio do IP (Zurich/Mechelen) para o centro real em Oostende.
                    displayCity = "OOSTENDE";
                    lat = 51.2155; 
                    lon = 2.9270;
                }

                document.getElementById('f-city').innerText = displayCity;
                document.getElementById('f-flag').src = `https://flagcdn.com/w40/${me.country.toLowerCase()}.png`;
                document.getElementById('net-info').innerHTML = `SISTEMA: ${tz}<br>VERIFICAÇÃO DE HARDWARE CONCLUÍDA`;

                data.forEach(loc => {
                    const phi = (90 - lat) * (Math.PI / 180);
                    const theta = (lon + 180) * (Math.PI / 180);
                    const anchor = new THREE.Object3D();
                    anchor.position.set(-(1.21 * Math.sin(phi) * Math.cos(theta)), 1.21 * Math.cos(phi), 1.21 * Math.sin(phi) * Math.sin(theta));
                    globe.add(anchor);

                    const tag = document.createElement('div');
                    tag.className = 'tag';
                    tag.innerHTML = `
                        <div class="tag-box">
                            <img src="https://flagcdn.com/w20/${me.country.toLowerCase()}.png" width="14">
                            <span>${displayCity}</span>
                        </div>
                        <div class="dot-rau"></div>
                    `;
                    document.getElementById('canvas-box').appendChild(tag);
                    markers.push({ anchor, tag });
                });
            }
        } catch(e) { console.error("Sync error"); }
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.002;
        controls.update();
        markers.forEach(m => {
            const v = new THREE.Vector3();
            m.anchor.getWorldPosition(v);
            const dot = v.clone().normalize().dot(camera.position.normalize());
            if (dot > 0.05) {
                v.project(camera);
                m.tag.style.left = (v.x * 220 + 220) + 'px';
                m.tag.style.top = (-(v.y * 175) + 175) + 'px';
                m.tag.style.display = "flex";
            } else { m.tag.style.display = "none"; }
        });
        renderer.render(scene, camera);
    }

    updateRadar();
    setInterval(updateRadar, 15000);
    animate();
</script>
</body>
</html>
