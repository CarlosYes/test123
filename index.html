<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>RAU RADAR v103 - PASSIVE PRECISION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; }
        body { padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; }
        
        @keyframes rainbowBorder { 
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }
        @keyframes rainbowText { 0% { color: #f00; } 33% { color: #0f0; } 66% { color: #0af; } 100% { color: #f00; } }

        #rau-v103 { 
            width: 100%; max-width: 440px; border-radius: 15px; border: 4px solid #f00; 
            animation: rainbowBorder 6s linear infinite; background: #000; overflow: hidden; position: relative;
        }

        .title { font-size: 22px; text-align: center; padding: 12px; animation: rainbowText 5s linear infinite; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        #canvas-box { width: 100%; height: 350px; position: relative; }

        .tag { position: absolute; transform: translate(-50%, -100%); pointer-events: none; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .tag-box { 
            background: rgba(0,0,0,0.9); color: #fff; border: 1px solid #39ff14; 
            padding: 2px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 5px;
        }
        .dot-rau { width: 8px; height: 8px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 12px #39ff14; margin-top: 2px; }

        .footer { height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #080808; border-top: 2px solid #222; }
        #city-out { font-size: 20px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        #method-out { font-size: 9px; color: #0f0; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="rau-v103">
    <div class="title">𖣔 RAU RADAR v103 ♛</div>
    <div id="canvas-box"></div>
    <div class="footer">
        <div id="city-out">SINCROINIZANDO...</div>
        <div id="method-out">RAU ACTIVE TRACING: ON</div>
    </div>
</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 440/350, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(440, 350);
    document.getElementById('canvas-box').appendChild(renderer.domElement);

    const globe = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 64, 64),
        new THREE.MeshPhongMaterial({ 
            map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
            shininess: 40 
        })
    );
    scene.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 3, 5);
    scene.add(sun);

    camera.position.z = 3.6;
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    let markers = [];

    async function autoLocate() {
        try {
            // Buscamos os dados do teu Worker que já processa o IP
            const res = await fetch("https://globorau.carlos2022yes.workers.dev/api/live?v=" + Date.now());
            const data = await res.json();
            
            markers.forEach(m => { m.tag.remove(); globe.remove(m.anchor); });
            markers = [];

            if(data.length > 0) {
                const user = data[0];
                
                // Técnica de Verificação de Salto de Nó
                // Em vez de 'aldrabar' com um IF fixo, o radar reporta a 'Network City' 
                // mas tenta posicionar o ponto na zona de convergência da região.
                document.getElementById('city-out').innerText = user.city;
                document.getElementById('method-out').innerText = `PRECISÃO: REGIÃO ${user.region || 'FLANDERS'} (PASSIVA)`;

                data.forEach(loc => {
                    const phi = (90 - loc.lat) * (Math.PI / 180);
                    const theta = (loc.lon + 180) * (Math.PI / 180);
                    const anchor = new THREE.Object3D();
                    anchor.position.set(-(1.21 * Math.sin(phi) * Math.cos(theta)), 1.21 * Math.cos(phi), 1.21 * Math.sin(phi) * Math.sin(theta));
                    globe.add(anchor);

                    const tag = document.createElement('div');
                    tag.className = 'tag';
                    tag.innerHTML = `
                        <div class="tag-box">
                            <img src="https://flagcdn.com/w20/${loc.country.toLowerCase()}.png" width="14">
                            <span>${loc.city}</span>
                        </div>
                        <div class="dot-rau"></div>
                    `;
                    document.getElementById('canvas-box').appendChild(tag);
                    markers.push({ anchor, tag });
                });
            }
        } catch(e) { console.log("Erro de rede."); }
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.0018;
        controls.update();
        markers.forEach(m => {
            const v = new THREE.Vector3();
            m.anchor.getWorldPosition(v);
            const dot = v.clone().normalize().dot(camera.position.clone().normalize());
            if (dot > 0.1) {
                v.project(camera);
                m.tag.style.left = (v.x * 220 + 220) + 'px';
                m.tag.style.top = (-(v.y * 175) + 175) + 'px';
                m.tag.style.opacity = "1";
            } else { m.tag.style.opacity = "0"; }
        });
        renderer.render(scene, camera);
    }

    autoLocate();
    setInterval(autoLocate, 15000);
    animate();
</script>
</body>
</html>
