<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Globo RAU - Verificação GitHub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; }
        body { padding: 5px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; }
        
        @keyframes rainbowText { 0% { color: #ff0000; } 20% { color: #ffff00; } 40% { color: #00ff00; } 60% { color: #00ffff; } 80% { color: #0000ff; } 100% { color: #ff0000; } }
        @keyframes rainbowBorder { 
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }
        @keyframes rainbowFlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        #dynamic-bg { 
            width: 100%; max-width: 440px; 
            border-radius: 15px; border: 4px solid #ff0000; 
            animation: rainbowBorder 6s linear infinite; 
            overflow: hidden; display: flex; flex-direction: column; 
            position: relative; transition: background 3s ease-in-out; 
            background: #000;
        }
        
        .title { font-size: 24px; text-align: center; padding: 12px; z-index: 100; text-shadow: 2px 2px 4px #000; animation: rainbowText 6s linear infinite; }
        #canvas-container { width: 100%; height: 350px; position: relative; cursor: grab; touch-action: none; }
        
        .location-tag { 
            position: absolute; pointer-events: none; display: flex; flex-direction: column; 
            align-items: center; z-index: 200; transform: translate(-50%, -100%);
        }
        .tag-box { 
            background: rgba(0, 0, 0, 0.7); color: #ffffff; padding: 2px 5px; border-radius: 3px; 
            font-size: 9px; font-weight: 900; display: flex; align-items: center; gap: 4px; 
            margin-bottom: 2px; white-space: nowrap;
        }
        .dot-online { width: 6px; height: 6px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 8px #39ff14; }
        
        .header { padding: 10px 20px; background: rgba(0, 0, 0, 0.3); display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        #time { font-size: 18px; animation: rainbowText 6s linear infinite; }
        .vis-pill { background: #ff0000; padding: 4px 12px; border-radius: 20px; font-size: 16px; color: #fff; border: 1px solid #fff; }
        
        .footer-display { height: 65px; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); border-top: 1px solid #222; }
        #singleLocation { 
            display: flex; align-items: center; gap: 10px; font-size: 17px; text-transform: uppercase; font-weight: bold; 
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #9400d3, #ff0000); 
            background-size: 300%; -webkit-background-clip: text; background-clip: text; color: transparent; 
            animation: rainbowFlow 6s linear infinite; transition: opacity 0.5s; 
        }
    </style>
</head>
<body>
<div id="dynamic-bg">
    <div class="title">𖣔 GLOBO RAU ♛</div>
    <div id="canvas-container">
        <div style="position: absolute; right: 20px; bottom: 10px; z-index: 110; color: #00ffff; font-size: 16px; font-weight: 900; text-shadow: 2px 2px 4px #000;">
            Visitas: <span id="totalHits">1.000</span>
        </div>
    </div>
    <div class="header">
        <span id="time">00:00:00</span>
        <div class="vis-pill">LIVE:<span id="visNum">00</span></div>
    </div>
    <div class="footer-display">
        <div id="singleLocation">
            <img id="fFlag" src="https://flagcdn.com/w40/pt.png" width="30"> 
            <span id="fCity">A SINCRONIZAR...</span>
        </div>
    </div>
</div>

<script>
    // ENDPOINT DO TEU WORKER PARA BUSCAR DADOS
    const API_URL = "https://globorau.carlos2022yes.workers.dev/api/live";

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 440 / 350, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    
    renderer.setSize(440, 350);
    container.appendChild(renderer.domElement);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Estrelas de fundo
    const starGeo = new THREE.BufferGeometry();
    const starVertices = [];
    for (let i = 0; i < 500; i++) starVertices.push((Math.random()-0.5)*10, (Math.random()-0.5)*10, -Math.random()*5);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true }));
    scene.add(stars);

    const loader = new THREE.TextureLoader();
    const globe = new THREE.Mesh(new THREE.SphereGeometry(1.2, 64, 64), new THREE.MeshPhongMaterial({ 
        map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'), 
        bumpMap: loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png'), 
        bumpScale: 0.05, shininess: 15 
    }));
    globeGroup.add(globe);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    camera.position.z = 3.8;
    
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    let markers = [];
    let liveData = [];
    let footerIdx = 0;

    async function sync() {
        try {
            const res = await fetch(API_URL + '?v=' + Date.now());
            liveData = await res.json();
            
            // Limpa marcas
            markers.forEach(m => { m.tag.remove(); globe.remove(m.anchor); });
            markers = [];

            document.getElementById('visNum').textContent = liveData.length.toString().padStart(2, '0');
            
            liveData.forEach((loc) => {
                const phi = (90 - loc.lat) * (Math.PI / 180);
                const theta = (loc.lon + 180) * (Math.PI / 180);
                const pos = new THREE.Vector3(-(1.205 * Math.sin(phi) * Math.cos(theta)), (1.205 * Math.cos(phi)), (1.205 * Math.sin(phi) * Math.sin(theta)));
                
                const anchor = new THREE.Object3D();
                anchor.position.copy(pos);
                globe.add(anchor);
                
                const tag = document.createElement('div');
                tag.className = 'location-tag';
                tag.innerHTML = `<div class="tag-box"><img src="https://flagcdn.com/w20/${loc.country}.png" width="12"><span>${loc.city}</span></div><div class="dot-online"></div>`;
                container.appendChild(tag);
                markers.push({ anchor, tag });
            });
        } catch (e) { console.log("Erro ao carregar dados do Worker."); }
    }

    function rotateFooter() {
        if (liveData.length === 0) return; 
        footerIdx = (footerIdx + 1) % liveData.length;
        const info = liveData[footerIdx];
        const el = document.getElementById('singleLocation');
        el.style.opacity = 0;
        setTimeout(() => {
            document.getElementById('fFlag').src = 'https://flagcdn.com/w40/' + info.country + '.png';
            document.getElementById('fCity').textContent = info.city;
            el.style.opacity = 1;
        }, 300);
    }

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.0015;
        controls.update();

        const widthHalf = 220, heightHalf = 175;
        const tempVec = new THREE.Vector3();

        markers.forEach(m => {
            m.anchor.getWorldPosition(tempVec);
            const dot = tempVec.clone().normalize().dot(camera.position.clone().normalize());
            if (dot > 0.05) {
                tempVec.project(camera);
                m.tag.style.left = (tempVec.x * widthHalf) + widthHalf + 'px';
                m.tag.style.top = -(tempVec.y * heightHalf) + heightHalf + 'px';
                m.tag.style.opacity = '1';
                m.tag.style.display = 'flex';
            } else { 
                m.tag.style.opacity = '0';
                m.tag.style.display = 'none';
            }
        });
        renderer.render(scene, camera);
    }

    setInterval(sync, 10000);
    setInterval(rotateFooter, 5000); 
    setInterval(() => { document.getElementById('time').textContent = new Date().toLocaleTimeString('pt-PT'); }, 1000);
    sync(); animate();
</script>
</body>
</html>
